meta:
  environment: node
  toolchain:
    name: npm
    version: "24"

build:
  additionalCommands: NODE_ENV=production npm run build
  artifacts:
    ".output": /
    "node_modules": /
    "package.json": /
    "package-lock.json": /

run:
  command: node .output/server/index.mjs
  containerPort: 3000
